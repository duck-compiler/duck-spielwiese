name: Continuous Integration

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Run Rust tests
  rust-tests:
    name: Run cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  python-tests:
    name: Run Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Python Test Script
        run: |
          ./install_std.sh
          cd ./tests
          export RUST_BACKTRACE=0
          python run_tests.py --cicd

  build-release:
    name: Build release binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: dargo
            asset-name: dargo-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: dargo.exe
            asset-name: dargo-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary-name: dargo
            asset-name: dargo-macos-x86_64

    runs-on: ${{ matrix.os }}
    needs: [rust-tests, python-tests]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary-name }}
          upload-name: ${{ matrix.asset-name }}
